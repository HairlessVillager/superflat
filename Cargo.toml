[package]
name = "superflat-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.0", features = ["derive"] }
glob = "0.3.3"
rayon = "1.11.0"
tokio = { version = "1.50.0", features = ["fs", "io-util", "macros", "process", "rt", "rt-multi-thread"] }

[dev-dependencies]
tempfile = "3.27.0"
