name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: sf
                    - target: x86_64-unknown-linux-musl
                      os: ubuntu-latest
                      artifact: sf
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: sf
                    - target: x86_64-apple-darwin
                      os: macos-latest
                      artifact: sf
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      artifact: sf
                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
                      artifact: sf.exe

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install cross-compilation tools (Linux)
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update -q
                  if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
                    sudo apt-get install -y musl-tools
                  elif [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
                    sudo apt-get install -y gcc-aarch64-linux-gnu
                  fi

            - name: Cache Cargo registry
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                  key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-${{ matrix.target }}-cargo-

            - name: Build
              env:
                  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
              run: cargo build --release --target ${{ matrix.target }}

            - name: Package binary (Unix)
              if: runner.os != 'Windows'
              run: |
                  cd target/${{ matrix.target }}/release
                  tar czf sf-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
                  mv sf-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ github.workspace }}/

            - name: Package binary (Windows)
              if: runner.os == 'Windows'
              run: |
                  cd target/${{ matrix.target }}/release
                  Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ${{ github.workspace }}/sf-${{ github.ref_name }}-${{ matrix.target }}.zip

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: sf-${{ matrix.target }}
                  path: |
                      sf-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
                      sf-${{ github.ref_name }}-${{ matrix.target }}.zip
                  if-no-files-found: error

    build-tauri-windows:
        name: Build Tauri Windows portable executable
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown

            - name: Cache Rust build artifacts
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: |
                      . -> target

            - name: Install Trunk
              run: cargo install trunk --locked

            - name: Install Tauri CLI
              run: cargo install tauri-cli --version "^2" --locked

            - name: Build portable Windows executable
              working-directory: superflat-gui-backend
              run: cargo tauri build --ci --target x86_64-pc-windows-msvc --no-bundle

            - name: Prepare release artifact
              shell: pwsh
              run: |
                  Copy-Item `
                    target/x86_64-pc-windows-msvc/release/superflat-gui.exe `
                    superflat-gui-${{ github.ref_name }}-x86_64-pc-windows-msvc.exe

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: superflat-gui-x86_64-pc-windows-msvc
                  path: superflat-gui-${{ github.ref_name }}-x86_64-pc-windows-msvc.exe
                  if-no-files-found: error

    release:
        name: Create Release
        needs:
            - build
            - build-tauri-windows
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  merge-multiple: true

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: artifacts/**
                  generate_release_notes: true
                  draft: false
                  prerelease: ${{ contains(github.ref_name, '-') }}
